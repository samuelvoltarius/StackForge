<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241047"/>
      <stop offset="0.55" stop-color="#3d1d7a"/>
      <stop offset="1" stop-color="#6b1f9c"/>
    </linearGradient>
    <linearGradient id="sheetTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe6ff"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe24d"/>
      <stop offset="1" stop-color="#ff8a3d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#9b6bff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#9b6bff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- App-Hintergrund (macOS-Squircle, gebacken) -->
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#glow)"/>

  <!-- Stapel aus Ebenen, von unscharf (unten) zu scharf (oben) -->
  <g transform="translate(512 560)">
    <!-- untere Ebenen: angedeutete Tiefenunschärfe via Transparenz -->
    <rect x="-300" y="40"  width="600" height="150" rx="34" transform="skewX(-26)" fill="#c9a8ff" opacity="0.28"/>
    <rect x="-300" y="-30" width="600" height="150" rx="34" transform="skewX(-26)" fill="#d8c0ff" opacity="0.45"/>
    <rect x="-300" y="-100" width="600" height="150" rx="34" transform="skewX(-26)" fill="#ecdfff" opacity="0.7"/>
    <!-- oberste Ebene: scharf -->
    <rect x="-300" y="-170" width="600" height="150" rx="34" transform="skewX(-26)" fill="url(#sheetTop)"/>
    <!-- Fokus-Reticle auf der scharfen Ebene -->
    <g transform="translate(0 -95) skewX(-26)" stroke="#6b1f9c" stroke-width="14" fill="none" stroke-linecap="round">
      <circle cx="0" cy="0" r="40"/>
      <line x1="-72" y1="0" x2="-52" y2="0"/>
      <line x1="52" y1="0" x2="72" y2="0"/>
      <line x1="0" y1="-72" x2="0" y2="-52"/>
      <line x1="0" y1="72" x2="0" y2="52"/>
    </g>
  </g>

  <!-- KI-/Auto-Funke -->
  <path d="M708 250 L628 410 L700 410 L636 560 L800 360 L716 360 L772 250 Z"
        fill="url(#spark)" stroke="#3d1d7a" stroke-width="10" stroke-linejoin="round"/>
</svg>
