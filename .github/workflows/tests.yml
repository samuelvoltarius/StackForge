name: tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System-Abhängigkeiten (OpenCV/Qt offscreen)
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Python-Abhängigkeiten
        run: |
          python -m pip install --upgrade pip
          pip install numpy "opencv-python-headless>=4.8" "PySide6>=6.5" rawpy tifffile imagecodecs
      - name: Tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v
